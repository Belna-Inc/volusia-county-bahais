<nav
  class="nav-inner mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 sm:px-6 lg:px-8"
  aria-label="Primary"
>
  <!-- Brand -->
  <a
    routerLink="/"
    class="group flex items-center gap-3 py-1 focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-primary"
    (click)="close()"
  >
    <app-star
      variant="outline"
      label="Bahá’ís of Volusia County"
      class="size-9 text-primary transition-transform duration-500 group-hover:scale-105"
    />
    <span class="flex flex-col leading-[1.05]">
      <span
        class="font-display text-xl font-bold uppercase tracking-[0.12em] text-base-content sm:text-2xl"
      >
        Bahá’ís
      </span>
      <span
        class="font-display text-[0.7rem] font-semibold uppercase tracking-[0.28em] text-base-content/60"
      >
        of Volusia County
      </span>
    </span>
  </a>

  <!-- Desktop links -->
  <ul class="hidden items-center gap-1 lg:flex">
    @for (link of links; track link.path) {
      <li>
        <a
          [routerLink]="link.path"
          routerLinkActive="is-active"
          #rla="routerLinkActive"
          [routerLinkActiveOptions]="{ exact: link.exact }"
          [attr.aria-current]="rla.isActive ? 'page' : null"
          class="nav-link"
        >
          {{ link.label }}
        </a>
      </li>
    }
  </ul>

  <div class="flex items-center gap-1 sm:gap-2">
    <!-- Colour scheme toggle -->
    <button
      type="button"
      class="btn btn-ghost btn-square btn-sm focus-ring"
      [attr.aria-pressed]="theme.mode() === 'dark'"
      [attr.aria-label]="
        theme.mode() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'
      "
      (click)="theme.toggle()"
    >
      @if (theme.mode() === 'dark') {
        <svg
          class="size-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.7"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="4.25" />
          <path
            stroke-linecap="round"
            d="M12 2.75v2M12 19.25v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2.75 12h2M19.25 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
          />
        </svg>
      } @else {
        <svg
          class="size-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.7"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z"
          />
        </svg>
      }
    </button>

    <a routerLink="/" fragment="connect" class="btn btn-primary btn-sm hidden sm:inline-flex">
      Connect
    </a>

    <!-- Mobile toggle -->
    <button
      type="button"
      class="btn btn-ghost btn-square btn-sm lg:hidden"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="mobile-menu"
      aria-label="Toggle navigation menu"
      (click)="toggle()"
    >
      @if (menuOpen()) {
        <svg
          class="size-6"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 6l12 12M18 6L6 18" />
        </svg>
      } @else {
        <svg
          class="size-6"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h16M4 17h16" />
        </svg>
      }
    </button>
  </div>
</nav>

<!-- Mobile menu -->
@if (menuOpen()) {
  <div
    id="mobile-menu"
    class="border-t border-base-300 bg-base-100 lg:hidden"
    animate.enter="menu-enter"
    animate.leave="menu-leave"
  >
    <ul class="mx-auto flex max-w-7xl flex-col gap-1 px-4 py-4 sm:px-6">
      @for (link of links; track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: link.exact }"
            class="nav-link-mobile"
            (click)="close()"
          >
            {{ link.label }}
          </a>
        </li>
      }
      <li class="pt-1">
        <a routerLink="/" fragment="connect" class="btn btn-primary w-full" (click)="close()">
          Connect with us
        </a>
      </li>
    </ul>
  </div>
}
