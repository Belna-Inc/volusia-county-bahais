<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bahá’ís of Volusia County — One human family on Florida’s coast</title>
    <meta
      name="description"
      content="The Bahá’í community of Volusia County, Florida — Daytona Beach, Deltona, DeLand and beyond. Working with our neighbors to build a unified, spiritually vibrant community. All are welcome."
    />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fbf6ec" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#17110e" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Resolve the colour scheme before first paint. The site is prerendered to
         static HTML, so without this every visitor would see a flash of the
         light theme before hydration could apply their preference. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var dark = stored
            ? stored === 'dark'
            : matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.dataset.theme = dark ? 'bahai-dark' : 'bahai';
        } catch (e) {
          document.documentElement.dataset.theme = 'bahai';
        }
      })();
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bahá’ís of Volusia County" />
    <meta
      property="og:description"
      content="One human family on Florida’s coast. Devotional gatherings, study circles, children’s classes and junior youth groups — open to all."
    />

    <!-- Typefaces (Cormorant Garamond + Inter) are self-hosted and bundled via
         src/styles.css — no third-party font request. -->
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
